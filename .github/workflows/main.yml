name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 600s
          script: |
            set -e

            APP_DIR="/home/ubuntu/converge_qa_bot"

            echo "→ Ensuring Docker is installed..."
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com -o get-docker.sh
              sudo sh get-docker.sh
              sudo usermod -aG docker ubuntu
            fi

            echo "→ Ensuring Docker Compose plugin is installed..."
            if ! docker compose version &> /dev/null; then
              sudo apt-get update -y
              sudo apt-get install -y docker-compose-plugin
            fi

            echo "→ Ensuring GitHub is trusted..."
            mkdir -p ~/.ssh
            ssh-keyscan github.com >> ~/.ssh/known_hosts

            echo "→ Pulling latest code from repo..."
            if [ ! -d "$APP_DIR/.git" ]; then
              rm -rf $APP_DIR
              git clone git@github.com-converge:301io-com/converge_qa_bot.git $APP_DIR
            else
              cd $APP_DIR
              git fetch origin main
              git reset --hard origin/main
            fi

            echo "→ Deploying using Docker Compose..."
            cd $APP_DIR
            docker compose down || true
            docker compose up -d --build

            echo "→ Cleaning up..."
            docker system prune -af --volumes
